spring:
  application:
    name: vms-backend
  config:
    import: optional:file:.env[.properties]
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/vms_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:2005}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # For dev; use validate for prod with Flyway
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 5000ms

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:mock_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  qr-secret-key: ${QR_SECRET_KEY:ThisIsASecretKeyForQRGeneration123}
  frontend-url: ${FRONTEND_URL:http://localhost:5500}
  jwt:
    secret: ${JWT_SECRET:ThisIsASecretKeyForJWTSignatureGenerationWithHS256Algorithm}
    expiration-ms: 28800000 # 8 hours
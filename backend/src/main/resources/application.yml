spring:
  application:
    name: vms-backend
  
  datasource:
    url: jdbc:mysql://localhost:3307/vms_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:2005}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # For dev; use validate for prod with Flyway
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 200ms

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:mock_sid}
  auth-token: ${TWILIO_AUTH_TOKEN:mock_token}
  verify:
    service-sid: ${TWILIO_VERIFY_SID:mock_verify_sid}
  whatsapp:
    from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

sendgrid:
  api-key: ${SENDGRID_API_KEY:mock_sendgrid_key}

app:
  qr-secret-key: ${QR_SECRET_KEY:ThisIsASecretKeyForQRGeneration123}
  frontend-url: ${FRONTEND_URL:http://localhost:5500}
  jwt:
    secret: ${JWT_SECRET:ThisIsASecretKeyForJWTSignatureGenerationWithHS256Algorithm}
    expiration-ms: 28800000 # 8 hours
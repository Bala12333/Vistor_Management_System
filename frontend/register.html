<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS | Visitor Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-light bg-white shadow-sm py-3 mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary d-flex align-items-center" href="index.html">
                <i class="bi bi-shield-check fs-3 me-2"></i> VMS Portal
            </a>
            <a href="index.html" class="btn btn-outline-secondary btn-sm rounded-pill px-3">Staff Login</a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="glass-panel p-4 p-md-5 animate-slide-up">
                    <h2 class="fw-bold mb-1 text-dark">Pre-Register Your Visit</h2>
                    <p class="text-muted mb-4">Please complete this form to receive your digital entry pass.</p>

                    <form class="needs-validation" novalidate id="registrationForm">
                        
                        <!-- Step 1: Personal Details -->
                        <h5 class="fw-bold text-primary mb-3"><i class="bi bi-1-circle-fill me-2"></i>Personal Details</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label-premium">Full Name *</label>
                                <input type="text" class="form-control form-control-premium" id="fullName" required placeholder="Enter full name">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-premium">Email Address *</label>
                                <input type="email" class="form-control form-control-premium" id="email" required placeholder="email@example.com">
                            </div>
                        </div>

                        <!-- OTP Section -->
                        <div class="bg-light p-4 rounded-3 border mb-4">
                            <label class="form-label-premium">Mobile Number (For OTP Verification) *</label>
                            <div class="input-group mb-3">
                                <span class="input-group-text bg-white border-end-0">+91</span>
                                <input type="tel" class="form-control form-control-premium border-start-0 ps-0" id="mobile" required pattern="[0-9]{10}" placeholder="10-digit mobile number">
                                <button class="btn btn-primary px-4" type="button" id="btnSendOtp">Send Code</button>
                            </div>
                            
                            <div class="otp-section mt-3 text-center" id="otpSection" style="display: none;">
                                <p class="small text-muted mb-2">Enter the 6-digit code sent to your mobile</p>
                                <div class="otp-container">
                                    <input type="text" class="otp-box" maxlength="1" required>
                                    <input type="text" class="otp-box" maxlength="1" required>
                                    <input type="text" class="otp-box" maxlength="1" required>
                                    <input type="text" class="otp-box" maxlength="1" required>
                                    <input type="text" class="otp-box" maxlength="1" required>
                                    <input type="text" class="otp-box" maxlength="1" required>
                                </div>
                                <div class="mt-2 text-success small fw-bold d-none" id="otpSuccessMsg"><i class="bi bi-check-circle"></i> Mobile Verified</div>
                            </div>
                        </div>

                        <!-- Step 2: Visit Details -->
                        <h5 class="fw-bold text-primary mb-3 mt-5"><i class="bi bi-2-circle-fill me-2"></i>Visit Details</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label-premium">Host Employee *</label>
                                <select class="form-select form-control-premium" id="hostEmployee" required>
                                    <option value="" selected disabled>Select Host...</option>
                                    <option value="1">John Doe (Engineering)</option>
                                    <option value="2">Jane Smith (HR)</option>
                                    <option value="3">Mike Johnson (Operations)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-premium">Expected Date & Time *</label>
                                <input type="datetime-local" class="form-control form-control-premium" id="expectedDate" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-premium">Visitor Category *</label>
                                <select class="form-select form-control-premium" id="visitorCategory" required>
                                    <option value="" selected disabled>Select Category...</option>
                                    <option value="CLIENT">Client / Business</option>
                                    <option value="INTERVIEW">Interview Candidate</option>
                                    <option value="VENDOR">Vendor / Supplier</option>
                                    <option value="DELIVERY">Delivery Personnel</option>
                                    <option value="SERVICE">Service / Tech</option>
                                    <option value="GUEST">Personal Guest</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-premium">Purpose of Visit *</label>
                                <input type="text" class="form-control form-control-premium" id="purpose" required placeholder="e.g. Project Discussion">
                            </div>
                        </div>
                        
                        <!-- Dynamic Fields injected here by JS -->
                        <div class="row g-3 mb-4" id="dynamicFieldsContainer"></div>

                        <!-- Step 3: Documents -->
                        <h5 class="fw-bold text-primary mb-3 mt-5"><i class="bi bi-3-circle-fill me-2"></i>Documents</h5>
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label-premium">Live Photo *</label>
                                <div class="border rounded-3 p-3 text-center bg-white">
                                    <img id="photoPreview" src="" alt="Preview" style="display:none; max-height: 150px; margin: 0 auto 10px;" class="rounded">
                                    <input type="file" class="form-control form-control-sm" id="photoUpload" accept="image/*" required>
                                    <small class="text-muted d-block mt-2">Max 5MB (JPG, PNG)</small>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-premium">Govt ID Proof *</label>
                                <div class="border rounded-3 p-3 text-center bg-white">
                                    <img id="idPreview" src="" alt="Preview" style="display:none; max-height: 150px; margin: 0 auto 10px;" class="rounded">
                                    <input type="file" class="form-control form-control-sm" id="idUpload" accept="image/*,application/pdf" required>
                                    <small class="text-muted d-block mt-2">Max 5MB (Aadhar, PAN, Driving License)</small>
                                </div>
                            </div>
                        </div>

                        <!-- Submit -->
                        <div class="text-end mt-5">
                            <button type="submit" class="btn btn-premium px-5 py-3 fs-5 w-100">Submit Registration <i class="bi bi-arrow-right ms-2"></i></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
